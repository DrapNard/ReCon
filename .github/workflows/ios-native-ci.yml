name: iOS Native CI

on:
  push:
    paths:
      - '.github/workflows/ios-native-ci.yml'
      - 'ReCon/**'
      - 'ReConWidget/**'
      - 'ReCon.xcodeproj/**'
  pull_request:
    paths:
      - '.github/workflows/ios-native-ci.yml'
      - 'ReCon/**'
      - 'ReConWidget/**'
      - 'ReCon.xcodeproj/**'

jobs:
  build-and-test-ios-native:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode Version
        run: xcodebuild -version

      - name: Build (no signing)
        run: |
          xcodebuild \
            -project ReCon.xcodeproj \
            -scheme ReCon \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test (simulator)
        run: |
          xcodebuild \
            -project ReCon.xcodeproj \
            -scheme ReCon \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            test
